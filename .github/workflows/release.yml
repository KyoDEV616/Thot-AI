name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── 1. Create the draft release first ───────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Thot AI ${{ github.ref_name }}" \
            --notes "## Thot AI ${{ github.ref_name }}

          **Instalación en un solo paso — Ollama se instala automáticamente.**

          **Descargá para tu plataforma (ver Assets abajo):**
          | Plataforma | Archivo |
          |------------|---------|
          | macOS Apple Silicon | \`Thot-AI_*_aarch64.pkg\` ← recomendado |
          | macOS Apple Silicon | \`Thot-AI_*_aarch64.dmg\` |
          | Windows 10/11 | \`Thot-AI_*_x64-setup.exe\` |
          | Linux (Ubuntu/Debian) | \`Thot-AI_*_amd64.deb\` |
          | Linux (universal) | \`Thot-AI_*_amd64.AppImage\` |

          ---

          ### Primer lanzamiento

          Al abrir la app por primera vez, un wizard te guía para descargar tu primer modelo de IA.
          No necesitás configurar nada manualmente.

          ### macOS
          Usá el \`.pkg\` — instala Ollama automáticamente y elimina el bloqueo de Gatekeeper.
          Si usás el \`.dmg\`, instalá Ollama por separado desde [ollama.com](https://ollama.com).

          ### Windows
          El \`.exe\` intenta instalar Ollama silenciosamente. Si falla, lo podés instalar manualmente desde [ollama.com](https://ollama.com).

          ### Linux (.deb)
          El postinstall del \`.deb\` instala Ollama automáticamente via \`curl | sh\`.
          El \`.AppImage\` no incluye Ollama — instalalo con: \`curl -fsSL https://ollama.com/install.sh | sh\`" \
            --repo "${{ github.repository }}" 2>/dev/null || echo "Release already exists, continuing."

  # ── 2. Build Python sidecar binaries ────────────────────────────────────────
  build-backend:
    name: Build Python backend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            triple: aarch64-apple-darwin
            python: '3.11'
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            python: '3.11'
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            python: '3.11'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        shell: bash
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install pyinstaller fastapi "uvicorn[standard]" httpx \
            sqlalchemy aiosqlite python-multipart pydantic pydantic-settings \
            Pillow duckduckgo-search python-docx openpyxl psutil

      - name: Build backend binary with PyInstaller
        shell: bash
        run: |
          cd backend
          pyinstaller standalone.spec --distpath dist --workpath build --noconfirm

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: thot-backend-${{ matrix.triple }}
          path: |
            backend/dist/thot-backend
            backend/dist/thot-backend.exe
          if-no-files-found: ignore
          retention-days: 1

  # ── 3. Build Tauri app and upload to the existing release ───────────────────
  build-tauri:
    name: Build Tauri app (${{ matrix.os }})
    needs: [create-release, build-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            triple: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin'
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            tauri-args: ''
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            tauri-args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add macOS ARM target
        if: matrix.triple == 'aarch64-apple-darwin'
        run: rustup target add aarch64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: thot-backend-${{ matrix.triple }}
          path: backend-binary

      - name: Place backend binary as Tauri sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          TRIPLE="${{ matrix.triple }}"
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp backend-binary/thot-backend.exe "src-tauri/binaries/thot-backend-${TRIPLE}.exe"
          else
            cp backend-binary/thot-backend "src-tauri/binaries/thot-backend-${TRIPLE}"
            chmod +x "src-tauri/binaries/thot-backend-${TRIPLE}"
          fi

      - name: Install frontend dependencies
        run: npm install

      - name: Download OllamaSetup.exe (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/windows" | Out-Null
          $url = "https://github.com/ollama/ollama/releases/latest/download/OllamaSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile "src-tauri/windows/OllamaSetup.exe" -UseBasicParsing
          $size = (Get-Item "src-tauri/windows/OllamaSetup.exe").Length
          Write-Host "Downloaded OllamaSetup.exe: $size bytes"
          if ($size -lt 1048576) { Write-Error "OllamaSetup.exe too small — download likely failed"; exit 1 }

      - name: Download Ollama CLI binary (macOS ARM64 only)
        if: matrix.triple == 'aarch64-apple-darwin'
        shell: bash
        run: |
          mkdir -p pkg-payload/usr/local/bin
          curl -L --retry 3 --retry-delay 5 \
            "https://github.com/ollama/ollama/releases/latest/download/ollama-darwin" \
            -o pkg-payload/usr/local/bin/ollama
          chmod +x pkg-payload/usr/local/bin/ollama
          file pkg-payload/usr/local/bin/ollama | grep -q "Mach-O" || \
            (echo "ERROR: Downloaded file is not a Mach-O binary" && exit 1)
          echo "Ollama binary downloaded: $(du -sh pkg-payload/usr/local/bin/ollama | cut -f1)"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Thot AI ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Build PKG installer (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TRIPLE="${{ matrix.triple }}"

          APP_PATH=$(find src-tauri/target -name "Thot AI.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Thot AI.app not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          # Post-install script: remove quarantine + install Ollama CLI + set up launchd
          mkdir -p pkg-scripts
          cat > pkg-scripts/postinstall << 'POSTINSTALL'
          #!/bin/bash
          set -e

          # 1. Remove Gatekeeper quarantine
          xattr -cr "/Applications/Thot AI.app" 2>/dev/null || true

          # 2. Install Ollama CLI if not already present
          if ! command -v ollama &>/dev/null; then
            if [ -f "/usr/local/bin/ollama" ]; then
              chmod +x "/usr/local/bin/ollama"
            fi
          fi

          # 3. Set up launchd plist for the actual logged-in user (not root)
          TARGET_USER=$(stat -f "%Su" /dev/console 2>/dev/null || echo "")
          if [ -n "$TARGET_USER" ] && [ "$TARGET_USER" != "root" ]; then
            USER_HOME=$(eval echo "~$TARGET_USER")
            PLIST_DIR="$USER_HOME/Library/LaunchAgents"
            PLIST_PATH="$PLIST_DIR/ai.thot.ollama.plist"
            mkdir -p "$PLIST_DIR"
            if [ ! -f "$PLIST_PATH" ]; then
              cat > "$PLIST_PATH" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key><string>ai.thot.ollama</string>
            <key>ProgramArguments</key>
            <array><string>/usr/local/bin/ollama</string><string>serve</string></array>
            <key>RunAtLoad</key><true/>
            <key>KeepAlive</key><true/>
            <key>StandardOutPath</key><string>/tmp/ollama.log</string>
            <key>StandardErrorPath</key><string>/tmp/ollama.err</string>
          </dict>
          </plist>
          PLIST
              launchctl asuser "$(id -u "$TARGET_USER")" launchctl load "$PLIST_PATH" 2>/dev/null || true
            fi
          fi
          POSTINSTALL
          chmod +x pkg-scripts/postinstall

          # Component 1: the app bundle
          pkgbuild \
            --component "$APP_PATH" \
            --install-location /Applications \
            --identifier "ai.thot.app" \
            --version "$VERSION" \
            thot-app.pkg

          # Component 2: the Ollama CLI binary (with postinstall script)
          pkgbuild \
            --root pkg-payload \
            --install-location / \
            --scripts pkg-scripts \
            --identifier "ai.thot.ollama-helper" \
            --version "$VERSION" \
            thot-ollama.pkg

          # Combine into a single flat package
          productbuild \
            --synthesize \
            --package thot-app.pkg \
            --package thot-ollama.pkg \
            distribution.xml

          productbuild \
            --distribution distribution.xml \
            --package-path . \
            "Thot-AI_${VERSION}_${TRIPLE}.pkg"

          echo "PKG built: Thot-AI_${VERSION}_${TRIPLE}.pkg"

      - name: Upload PKG to release (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TRIPLE="${{ matrix.triple }}"
          gh release upload "${{ github.ref_name }}" \
            "Thot-AI_${VERSION}_${TRIPLE}.pkg" \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Repack .deb with Ollama postinst (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          if [ -z "$DEB" ]; then echo "ERROR: No .deb found" && exit 1; fi
          echo "Repacking: $DEB"

          mkdir -p deb-repack/extracted
          dpkg-deb --raw-extract "$DEB" deb-repack/extracted

          # Regenerate md5sums to avoid dpkg warnings
          find deb-repack/extracted -not -path '*/DEBIAN/*' -type f | \
            while read -r f; do md5sum "$f" | sed "s|deb-repack/extracted/||"; done \
            > deb-repack/extracted/DEBIAN/md5sums

          # Inject postinst script
          cat > deb-repack/extracted/DEBIAN/postinst << 'POSTINST'
          #!/bin/bash
          set -e
          if ! command -v ollama &>/dev/null; then
            if command -v curl &>/dev/null; then
              curl -fsSL https://ollama.com/install.sh | sh
            else
              echo "curl not found — install Ollama manually from https://ollama.com/download"
            fi
          fi
          systemctl enable --now ollama 2>/dev/null || true
          exit 0
          POSTINST
          chmod 755 deb-repack/extracted/DEBIAN/postinst

          dpkg-deb --build deb-repack/extracted "$DEB"
          echo "Repacked: $DEB"

      - name: Upload repacked .deb to release (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          gh release upload "${{ github.ref_name }}" "$DEB" \
            --clobber \
            --repo "${{ github.repository }}"
